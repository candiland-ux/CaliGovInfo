<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#ffffff">
<meta name="supported-color-schemes" content="light">
<title>California Governor 2026 — Candidate Matcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: light only; }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #ffffff !important;
    color: #111111 !important;
    -webkit-text-fill-color: #111111;
    font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    min-height: 100vh;
  }

  @media (prefers-color-scheme: dark) {
    html, body { background: #ffffff !important; color: #111111 !important; -webkit-text-fill-color: #111111; }
  }

  .stage {
    max-width: 680px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  /* INTRO */
  .tag {
    display: inline-block;
    background: #1a1a1a !important;
    color: #ffffff !important;
    -webkit-text-fill-color: #ffffff;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    padding: 6px 12px;
    text-transform: uppercase;
    border-radius: 3px;
    margin-bottom: 24px;
  }

  h1 {
    font-size: clamp(32px, 7vw, 44px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
    color: #111 !important;
    -webkit-text-fill-color: #111;
  }

  .lede {
    font-size: 18px;
    color: #444 !important;
    -webkit-text-fill-color: #444;
    margin-bottom: 32px;
    line-height: 1.45;
  }

  .intro-card {
    background: #f7f5f0 !important;
    border: 1px solid #e4e0d6;
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 28px;
  }

  .intro-card h3 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #888 !important;
    -webkit-text-fill-color: #888;
    margin-bottom: 16px;
  }

  .intro-steps {
    list-style: none;
    counter-reset: steps;
  }

  .intro-steps li {
    counter-increment: steps;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 10px 0;
    border-bottom: 1px solid #e4e0d6;
    font-size: 15px;
    line-height: 1.4;
    color: #222 !important;
    -webkit-text-fill-color: #222;
  }
  .intro-steps li:last-child { border-bottom: none; }
  .intro-steps li::before {
    content: counter(steps);
    background: #111 !important;
    color: #fff !important;
    -webkit-text-fill-color: #fff;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat {
    background: #fff !important;
    border: 1px solid #e4e0d6;
    border-radius: 6px;
    padding: 14px 10px;
    text-align: center;
  }
  .stat-num {
    font-size: 22px;
    font-weight: 700;
    color: #111 !important;
    -webkit-text-fill-color: #111;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label {
    font-size: 11px;
    color: #666 !important;
    -webkit-text-fill-color: #666;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .cta-wrap {
    text-align: center;
    padding: 12px 0;
  }

  .cta {
    display: block;
    width: 100%;
    background: #c8321a !important;
    color: #ffffff !important;
    -webkit-text-fill-color: #ffffff !important;
    border: none;
    font-family: inherit;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.01em;
    padding: 18px 24px;
    border-radius: 8px;
    cursor: pointer;
    text-align: center;
    box-shadow: 0 2px 0 #8a1f0c;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .cta:hover, .cta:focus { background: #b02816 !important; }
  .cta:active { transform: translateY(2px); box-shadow: 0 0 0 #8a1f0c; }

  .hint {
    font-size: 13px;
    color: #666 !important;
    -webkit-text-fill-color: #666;
    margin-top: 12px;
    font-style: italic;
  }

  .disclaimer {
    margin-top: 28px;
    padding: 14px 16px;
    background: #fffaf0 !important;
    border-left: 3px solid #c8321a;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1.5;
    color: #444 !important;
    -webkit-text-fill-color: #444;
  }
  .disclaimer strong { color: #111 !important; -webkit-text-fill-color: #111; }

  .data-banner {
    padding: 10px 14px;
    background: #fef5f2 !important;
    border-left: 3px solid #c8441c;
    border-radius: 4px;
    margin-bottom: 20px;
    font-size: 13px;
    line-height: 1.5;
    color: #4a2a20 !important;
    -webkit-text-fill-color: #4a2a20;
  }
  .data-banner strong {
    color: #8a2010 !important;
    -webkit-text-fill-color: #8a2010;
    font-weight: 700;
  }
  .data-banner a {
    color: #8a2010 !important;
    -webkit-text-fill-color: #8a2010;
    text-decoration: underline;
  }

  /* ==================== ECONOMIC CONTEXT CALLOUT ==================== */
  .econ-callout {
    background: #faf7f0 !important;
    border: 1px solid #2a251e;
    padding: 20px;
    margin: 24px 0;
  }
  .econ-callout-kicker {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #8b2e1f !important;
    -webkit-text-fill-color: #8b2e1f;
    margin-bottom: 6px;
  }
  .econ-callout-title {
    font-size: 18px;
    font-weight: 700;
    color: #1a1814 !important;
    -webkit-text-fill-color: #1a1814;
    margin-bottom: 10px;
    line-height: 1.25;
  }
  .econ-callout-lead {
    font-size: 14px;
    color: #3a352e !important;
    -webkit-text-fill-color: #3a352e;
    line-height: 1.5;
    margin-bottom: 14px;
  }
  .econ-tables-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: 6px;
  }
  .econ-table-wrap {
    background: #f0ebdc !important;
    border: 1px solid #2a251e;
    display: flex;
    flex-direction: column;
  }
  .econ-table-label {
    background: #1a1814 !important;
    color: #faf7f0 !important;
    -webkit-text-fill-color: #faf7f0;
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .econ-table-scroll {
    max-height: 280px;
    overflow-y: auto;
    background: #faf7f0 !important;
  }
  .econ-table-scroll::-webkit-scrollbar { width: 8px; }
  .econ-table-scroll::-webkit-scrollbar-track { background: #f0ebdc; }
  .econ-table-scroll::-webkit-scrollbar-thumb { background: #2a251e; border-radius: 0; }
  .econ-mini-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    table-layout: fixed;
  }
  .econ-mini-table thead {
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .econ-mini-table th {
    background: #1a1814 !important;
    color: #faf7f0 !important;
    -webkit-text-fill-color: #faf7f0;
    padding: 6px 6px;
    text-align: left;
    font-size: 9px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .econ-mini-table th:nth-child(1) { width: 28%; }
  .econ-mini-table th:nth-child(2) { width: 22%; }
  .econ-mini-table th:nth-child(3) { width: 32%; }
  .econ-mini-table th:nth-child(4) { width: 18%; }
  .econ-mini-table td {
    padding: 6px 6px;
    border-bottom: 1px solid rgba(42,37,30,0.12);
    vertical-align: top;
    color: #2a251e !important;
    -webkit-text-fill-color: #2a251e;
    font-size: 12px;
    line-height: 1.35;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  .econ-mini-table td:first-child {
    font-weight: 600;
    background: rgba(42,37,30,0.04) !important;
  }
  .econ-mini-table td:nth-child(2), .econ-mini-table td:nth-child(3) {
    color: #5a544a !important;
    -webkit-text-fill-color: #5a544a;
  }
  .econ-tag {
    font-size: 10px !important;
    padding: 2px 5px !important;
  }
  .econ-table-foot {
    padding: 8px 12px;
    font-size: 11px;
    line-height: 1.45;
    color: #2a251e !important;
    -webkit-text-fill-color: #2a251e;
    background: #e5e1d6 !important;
    border-top: 1px solid #2a251e;
  }
  .econ-table-foot strong { color: #1a1814 !important; -webkit-text-fill-color: #1a1814; }

  /* ==================== ECONOMIC OVERLAY ==================== */
  .econ-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #faf7f0 !important;
    z-index: 1000;
    display: none;
    overflow-y: auto;
  }
  .econ-overlay.open { display: block; }
  .econ-top {
    position: sticky;
    top: 0;
    background: #faf7f0 !important;
    border-bottom: 1px solid #2a251e;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
  }
  .econ-top-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #8b2e1f !important;
    -webkit-text-fill-color: #8b2e1f;
  }
  .econ-close {
    background: #1a1814 !important;
    color: #faf7f0 !important;
    -webkit-text-fill-color: #faf7f0;
    border: none;
    padding: 8px 16px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    border-radius: 4px;
    cursor: pointer;
  }
  .econ-content {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }
  .econ-content h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 12px;
    color: #1a1814 !important;
    -webkit-text-fill-color: #1a1814;
    line-height: 1.15;
  }
  .econ-content h2 {
    font-size: 20px;
    font-weight: 700;
    margin-top: 36px;
    margin-bottom: 12px;
    color: #8b2e1f !important;
    -webkit-text-fill-color: #8b2e1f;
    padding-bottom: 6px;
    border-bottom: 2px solid #8b2e1f;
  }
  .econ-content h3 {
    font-size: 16px;
    font-weight: 700;
    margin-top: 24px;
    margin-bottom: 10px;
    color: #1a1814 !important;
    -webkit-text-fill-color: #1a1814;
  }
  .econ-content .section-kicker {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: #8b2e1f !important;
    -webkit-text-fill-color: #8b2e1f;
    margin-top: 36px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .econ-content p {
    font-size: 15px;
    line-height: 1.6;
    color: #2a251e !important;
    -webkit-text-fill-color: #2a251e;
    margin-bottom: 14px;
  }
  .econ-content p.lead {
    font-size: 17px;
    font-weight: 400;
    color: #1a1814 !important;
    -webkit-text-fill-color: #1a1814;
  }
  .econ-content ul {
    padding-left: 20px;
    margin-bottom: 16px;
  }
  .econ-content ul li {
    font-size: 15px;
    line-height: 1.6;
    color: #2a251e !important;
    -webkit-text-fill-color: #2a251e;
    margin-bottom: 6px;
  }
  .econ-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin: 16px 0;
    border: 1px solid #2a251e;
    background: #f0ebdc !important;
  }
  .econ-table th {
    background: #1a1814 !important;
    color: #faf7f0 !important;
    -webkit-text-fill-color: #faf7f0;
    padding: 10px 8px;
    text-align: left;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .econ-table th small {
    display: block;
    font-size: 9px;
    opacity: 0.75;
    letter-spacing: 0;
    text-transform: none;
    font-weight: 400;
    margin-top: 2px;
  }
  .econ-table td {
    padding: 9px 8px;
    border-bottom: 1px solid rgba(42,37,30,0.12);
    vertical-align: top;
    color: #2a251e !important;
    -webkit-text-fill-color: #2a251e;
  }
  .econ-table td:first-child {
    font-weight: 600;
    background: rgba(42,37,30,0.04) !important;
    font-size: 13px;
  }
  .econ-tag {
    display: inline-block;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
    border-radius: 2px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .econ-tag-worse { background: #f4d9d3 !important; color: #8b2e1f !important; -webkit-text-fill-color: #8b2e1f; }
  .econ-tag-better { background: #d4e8d9 !important; color: #2d5a3d !important; -webkit-text-fill-color: #2d5a3d; }
  .econ-tag-neutral { background: #e5e1d6 !important; color: #5a544a !important; -webkit-text-fill-color: #5a544a; }
  .econ-callout-box {
    background: #f0ebdc !important;
    border-left: 3px solid #8b2e1f;
    padding: 12px 14px;
    margin: 12px 0;
    font-size: 14px;
    line-height: 1.55;
  }
  .econ-callout-box-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #8b2e1f !important;
    -webkit-text-fill-color: #8b2e1f;
    display: block;
    margin-bottom: 4px;
  }
  .econ-scorecard {
    background: #1a1814 !important;
    color: #faf7f0 !important;
    -webkit-text-fill-color: #faf7f0;
    padding: 14px 16px;
    font-size: 14px;
    margin: 12px 0 20px;
  }
  .econ-scorecard strong { color: #faf7f0 !important; -webkit-text-fill-color: #faf7f0; }
  .econ-glossary-item {
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(42,37,30,0.12);
  }
  .econ-glossary-item:last-child { border-bottom: none; }
  .econ-glossary-term {
    font-size: 14px;
    font-weight: 700;
    color: #8b2e1f !important;
    -webkit-text-fill-color: #8b2e1f;
    display: block;
    margin-bottom: 3px;
  }
  .econ-glossary-def {
    font-size: 13px;
    line-height: 1.5;
    color: #2a251e !important;
    -webkit-text-fill-color: #2a251e;
  }

  /* ==========================================================
     BRIEFING — full-screen overlay
     ========================================================== */
  .briefing-link-row {
    margin-top: 16px;
    text-align: center;
  }
  .briefing-link {
    display: inline-block;
    background: transparent !important;
    color: #c8441c !important;
    -webkit-text-fill-color: #c8441c;
    border: none;
    font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    padding: 10px 4px;
    text-decoration: underline;
    text-underline-offset: 4px;
    -webkit-appearance: none;
    appearance: none;
  }
  .briefing-link:hover, .briefing-link:active {
    color: #a0361a !important;
    -webkit-text-fill-color: #a0361a;
  }

  /* Prominent briefing CTA on result page */
  .briefing-cta {
    margin: 32px 0 20px;
    padding: 20px 22px;
    background: #f7f6f3 !important;
    border: 1px solid #1a1a1a;
    text-align: center;
  }
  .briefing-cta-btn {
    display: inline-block;
    background: #1a1a1a !important;
    color: #ffffff !important;
    -webkit-text-fill-color: #ffffff;
    border: none;
    font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 14px 28px;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    transition: background-color 0.15s;
  }
  .briefing-cta-btn:hover, .briefing-cta-btn:active {
    background: #c8441c !important;
  }
  .briefing-cta-hint {
    margin-top: 12px;
    font-size: 13px;
    font-style: italic;
    color: #6a6a67 !important;
    -webkit-text-fill-color: #6a6a67;
  }

  .briefing-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #ffffff !important;
    z-index: 10000;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .briefing-overlay.open { display: block; }
  .briefing-topbar {
    position: sticky;
    top: 0;
    background: #ffffff !important;
    border-bottom: 1px solid #e5e3de;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
  }
  .briefing-topbar-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #111 !important;
    -webkit-text-fill-color: #111;
  }
  .briefing-close {
    background: transparent !important;
    border: 1px solid #111;
    color: #111 !important;
    -webkit-text-fill-color: #111;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
  }
  .briefing-close:hover, .briefing-close:active {
    background: #111 !important;
    color: #fff !important;
    -webkit-text-fill-color: #fff;
  }
  .briefing-stage {
    max-width: 720px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }
  .briefing-stage h2.b-h1 {
    font-size: clamp(24px, 5vw, 30px);
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.01em;
    color: #111 !important;
    -webkit-text-fill-color: #111;
    margin: 28px 0 12px;
    padding-bottom: 10px;
    border-bottom: 2px solid #111;
  }
  .briefing-stage h2.b-h1:first-child { margin-top: 0; }
  .briefing-stage h3.b-h2 {
    font-size: 18px;
    font-weight: 700;
    color: #111 !important;
    -webkit-text-fill-color: #111;
    margin: 20px 0 10px;
  }
  .briefing-stage h4.b-h3 {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #c8441c !important;
    -webkit-text-fill-color: #c8441c;
    margin: 18px 0 8px;
  }
  .briefing-stage p.b-p {
    font-size: 15px;
    line-height: 1.6;
    color: #111 !important;
    -webkit-text-fill-color: #111;
    margin-bottom: 12px;
  }
  .briefing-stage ul.b-ul {
    margin: 8px 0 16px 0;
    padding-left: 0;
    list-style: none;
  }
  .briefing-stage ul.b-ul li {
    font-size: 14px;
    line-height: 1.55;
    color: #111 !important;
    -webkit-text-fill-color: #111;
    padding: 6px 0 6px 18px;
    position: relative;
  }
  .briefing-stage ul.b-ul li::before {
    content: '→';
    position: absolute;
    left: 0;
    top: 6px;
    color: #c8441c !important;
    -webkit-text-fill-color: #c8441c;
    font-weight: 700;
  }
  .briefing-stage ul.b-ul li strong { font-weight: 600; }
  .briefing-toc {
    background: #f7f6f3 !important;
    padding: 18px 20px;
    margin-bottom: 24px;
  }
  .briefing-toc h4 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #6a6a67 !important;
    -webkit-text-fill-color: #6a6a67;
    margin-bottom: 10px;
  }
  .briefing-toc a {
    display: block;
    padding: 6px 0;
    color: #111 !important;
    -webkit-text-fill-color: #111;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    border-bottom: 1px solid #e5e3de;
  }
  .briefing-toc a:last-child { border-bottom: none; }
  .briefing-toc a:hover { color: #c8441c !important; -webkit-text-fill-color: #c8441c; }
  .bcard {
    border: 1px solid #e5e3de;
    padding: 18px 20px;
    margin-bottom: 16px;

function renderQuestion() {
  const q = QUESTIONS[state.step];
  const pct = Math.round(((state.step + 1) / QUESTIONS.length) * 100);

  let optsHtml, navHtml, helperHtml = '';

  if (q.multi) {
    // Multi-select: state.answers[q.id] is an array of keys in selection order
    const selected = state.answers[q.id] || [];
    const maxPicks = q.maxPicks || 3;

    optsHtml = q.options.map(opt => {
      const idx = selected.indexOf(opt.key);
      const isSel = idx !== -1;
      const rank = isSel ? `<span class="rank-badge">${idx + 1}</span>` : '';
      const cls = isSel ? 'selected' : '';
      const sub = opt.sub ? `<small>${opt.sub}</small>` : '';
      return `<button class="opt multi ${cls}" onclick="toggleMulti('${q.id}', '${opt.key}', ${maxPicks})"><strong>${rank}${opt.label}</strong>${sub}</button>`;
    }).join('');

    const pickedCount = selected.length;
    const remainingText = pickedCount === 0
      ? `Tap up to <strong>${maxPicks}</strong> issues in order of importance`
      : pickedCount < maxPicks
        ? `<strong>${pickedCount} of ${maxPicks} picked.</strong> Tap another, or Continue`
        : `<strong>${maxPicks} picked.</strong> Tap Continue, or swap a pick`;

    helperHtml = `<p class="multi-helper">${remainingText}</p>`;

    navHtml = `
      <button class="continue-btn" onclick="continueMulti()" ${pickedCount === 0 ? 'disabled' : ''}>
        ${pickedCount === 0 ? 'Pick at least one to continue' : 'Continue →'}
      </button>
      <div class="nav">
        <button class="back-btn" onclick="goBack()" ${state.step === 0 ? 'disabled' : ''}>← Back</button>
        <span class="nav-hint">${pickedCount > 0 ? `${pickedCount} selected` : ''}</span>
      </div>
    `;
  } else {
    // Single-select (original behavior)
    const selected = state.answers[q.id];
    optsHtml = q.options.map(opt => {
      const sel = selected === opt.key ? 'selected' : '';
      const sub = opt.sub ? `<small>${opt.sub}</small>` : '';
      return `<button class="opt ${sel}" onclick="answer('${q.id}', '${opt.key}')"><strong>${opt.label}</strong>${sub}</button>`;
    }).join('');

    navHtml = `
      <div class="nav">
        <button class="back-btn" onclick="goBack()" ${state.step === 0 ? 'disabled' : ''}>← Back</button>
        <span class="nav-hint">Tap an answer to continue</span>
      </div>
    `;
  }

  app.innerHTML = `
    <div class="fade-in">
      <div class="progress-row">
        <span class="progress-text">Question ${state.step + 1} of ${QUESTIONS.length}</span>
        <div class="progress-bar"><div class="progress-fill" style="width: ${pct}%"></div></div>
      </div>
      <h2 class="q-title">${q.title}</h2>
      ${q.sub ? `<p class="q-sub">${q.sub}</p>` : ''}
      ${helperHtml}
      <div class="options">${optsHtml}</div>
      ${navHtml}
    </div>
  `;
}

function toggleMulti(qid, optKey, maxPicks) {
  if (!state.answers[qid]) state.answers[qid] = [];
  const arr = state.answers[qid];
  const idx = arr.indexOf(optKey);
  if (idx !== -1) {
    // Deselect
    arr.splice(idx, 1);
  } else {
    if (arr.length >= maxPicks) {
      // Replace last pick with new one
      arr.pop();
    }
    arr.push(optKey);
  }
  render();
}

function continueMulti() {
  const q = QUESTIONS[state.step];
  const arr = state.answers[q.id] || [];
  if (arr.length === 0) return;
  state.step++;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

function renderResult() {
  const scores = computeScores();
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const [winnerKey, winnerScore] = sorted[0];
  const [runnerKey, runnerScore] = sorted[1];
  const winner = CANDIDATES[winnerKey];
  const runner = CANDIDATES[runnerKey];
  const maxPossible = computeMaxPossible();
  const alignmentPct = Math.round((winnerScore / maxPossible) * 100);

  const reasons = buildReasons(winnerKey);
  const caveat = CAVEATS[winnerKey];

  const reasonsHtml = reasons.map(r => {
    if (r.html) return r.html;
    return `<div class="reason"><div class="reason-label">${r.q}</div><div class="reason-text">${r.body}</div></div>`;
  }).join('');

  const scoresHtml = sorted.map(([k, s]) => {
    const c = CANDIDATES[k];
    const candPct = maxPossible > 0 ? Math.round((s / maxPossible) * 100) : 0;
    return `<div class="score-row"><span class="score-name">${c.name}<span class="p">(${c.party})</span></span><span class="score-val">${candPct}%</span></div>`;
  }).join('');

  // Runner-up block with tie detection (exclude winner from tied list)
  const runnerPct = Math.round((runnerScore / maxPossible) * 100);
  const tied = sorted.filter(([k, s]) => s === runnerScore && k !== winnerKey);
  const firstPlaceTie = sorted[0][1] === runnerScore;
  let runnerBlockHtml;
  if (tied.length === 1) {
    runnerBlockHtml = `
      <div class="runner">
        <div class="runner-body">
          <div class="runner-label">${firstPlaceTie ? 'Tied for Top' : 'Close Runner-Up'}</div>
          <div class="runner-name">${runner.name}</div>
          <div class="runner-note">${runner.oneLiner}</div>
        </div>
        <div>
          <div class="runner-pts">${runnerPct}%</div>
          <div class="runner-pts-label">${firstPlaceTie ? 'same as top' : 'alignment'}</div>
        </div>
      </div>
    `;
  } else if (tied.length > 1) {
    const tiedNames = tied.map(([k]) => CANDIDATES[k].name).join(' and ');
    const tiedOneLiners = tied.map(([k]) => `<strong>${CANDIDATES[k].name}:</strong> ${CANDIDATES[k].oneLiner}`).join('<br><br>');
    runnerBlockHtml = `
      <div class="runner">
        <div class="runner-body">
          <div class="runner-label">${firstPlaceTie ? 'Tied for Top' : 'Runner-Up (Tied)'}</div>
          <div class="runner-name">${tiedNames}</div>
          <div class="runner-note">${tiedOneLiners}</div>
        </div>
        <div>
          <div class="runner-pts">${runnerPct}%</div>
          <div class="runner-pts-label">${firstPlaceTie ? 'same as top' : 'each'}</div>
        </div>
      </div>
    `;
  } else {
    runnerBlockHtml = '';
  }

  app.innerHTML = `
    <div class="fade-in">
      <div class="result-head">
        <div class="result-kicker">Your Top Match</div>
        <h2 class="result-name">${winner.name}</h2>

  `;
}

// Multipliers for ranked multi-select picks (1st, 2nd, 3rd in importance)
const RANK_MULTIPLIERS = [1.0, 0.6, 0.3];

function computeScores() {
  const scores = {};
  Object.keys(CANDIDATES).forEach(k => scores[k] = 0);
  QUESTIONS.forEach(q => {
    const ans = state.answers[q.id];
    if (!ans) return;

    if (q.multi) {
      // Multi-select: ans is an array of keys in ranked order
      if (!Array.isArray(ans) || ans.length === 0) return;
      ans.forEach((key, idx) => {
        const opt = q.options.find(o => o.key === key);
        if (!opt || !opt.weights) return;
        const mult = RANK_MULTIPLIERS[idx] || 0;
        Object.entries(opt.weights).forEach(([c, p]) => {
          scores[c] = (scores[c] || 0) + (p * mult);
        });
      });
    } else {
      // Single-select
      const opt = q.options.find(o => o.key === ans);
      if (!opt) return;
      if (opt.weights) Object.entries(opt.weights).forEach(([c, p]) => scores[c] = (scores[c] || 0) + p);
      if (opt.eliminates && opt.eliminates.length) {
        opt.eliminates.forEach(c => { scores[c] = Math.round((scores[c] || 0) * 0.3); });
      }
    }
  });
  // Note: do NOT round here — fractional scores from rank multipliers (1.0/0.6/0.3)
  // are what prevent false ties. Rounding happens only at display time for percentages.
  return scores;
}

function computeMaxPossible() {
  let max = 0;
  QUESTIONS.forEach(q => {
    if (q.multi) {
      // Max for multi = sum of top picks times their multipliers
      // Find the highest weight any single candidate could get on each rank position
      const allMaxes = q.options
        .filter(o => o.weights)
        .map(o => Math.max(...Object.values(o.weights)));
      allMaxes.sort((a, b) => b - a);
      for (let i = 0; i < Math.min(q.maxPicks || 3, allMaxes.length); i++) {
        max += (allMaxes[i] || 0) * (RANK_MULTIPLIERS[i] || 0);
      }
    } else {
      let qMax = 0;
      q.options.forEach(opt => {
        if (opt.weights) {
          const localMax = Math.max(...Object.values(opt.weights));
          if (localMax > qMax) qMax = localMax;
        }
      });
      max += qMax;
    }
  });
  return Math.round(max);
}

// Return the last name (or full name if only one word).
// Used in narrative so we say "Villaraigosa" not "Antonio" — standard political shorthand.
function lastName(fullName) {
  if (!fullName) return '';
  const parts = fullName.trim().split(/\s+/);
  return parts[parts.length - 1];
}

function buildReasons(winnerKey) {
  const reasons = [];
  const scores = computeScores();
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const runnerKey = sorted[1][0];
  const winnerFirst =lastName( CANDIDATES[winnerKey].name);

  // 1. Top-issues reason — walk through each ranked pick
  const topIssues = state.answers.topIssue;
  if (topIssues && Array.isArray(topIssues) && topIssues.length > 0) {
    const rankLabels = ['Your #1 issue', 'Your #2 issue', 'Your #3 issue'];
    topIssues.forEach((key, idx) => {
      const opt = QUESTIONS[0].options.find(o => o.key === key);
      if (!opt) return;
      const stance = (CANDIDATE_STANCES[winnerKey] && CANDIDATE_STANCES[winnerKey].topIssue && CANDIDATE_STANCES[winnerKey].topIssue[key])
        ? CANDIDATE_STANCES[winnerKey].topIssue[key]
        : null;
      const label = ANSWER_LABELS.topIssue[key] || key;
      const weight = opt.weights ? (opt.weights[winnerKey] || 0) : 0;
      let body;
      if (stance) {
        body = `You picked <strong>${label}</strong>. ${winnerFirst}: ${stance}`;
      } else {
        // No direct stance — fall back to the generic issue template, but attribute it clearly
        body = `You picked <strong>${label}</strong>. ${opt.reason || ''}`;
      }
      // Add a note if the winner didn't actually score well on this issue
      if (weight <= 1) {
        const topScorer = opt.weights ? Object.entries(opt.weights).sort((a,b) => b[1]-a[1])[0] : null;
        if (topScorer && topScorer[0] !== winnerKey) {
          body += ` <em>Note: ${lastName(CANDIDATES[topScorer[0]].name)} has the strongest record on this specific issue.</em>`;
        }
      }
      reasons.push({ q: rankLabels[idx], body });
    });
  }

  // 2. About-candidate blurb
  reasons.push({ q: `About ${winnerFirst}`, body: CANDIDATE_FITS[winnerKey] });

  // 3. Where you aligned (strong matches, score 3-5) — but skip topIssue since it's already covered above
  const aligned = [];
  const misaligned = [];

  QUESTIONS.forEach(q => {
    if (q.id === 'redflag') return;
    if (q.id === 'topIssue') return; // already handled above
    const ansKey = state.answers[q.id];
    if (!ansKey) return;
    const opt = q.options.find(o => o.key === ansKey);
    if (!opt || !opt.weights) return;
    const pts = opt.weights[winnerKey] || 0;
    const answerLabel = ANSWER_LABELS[q.id] ? ANSWER_LABELS[q.id][ansKey] : ansKey;
    const stance = (CANDIDATE_STANCES[winnerKey] && CANDIDATE_STANCES[winnerKey][q.id])
      ? CANDIDATE_STANCES[winnerKey][q.id][ansKey]
      : null;

    if (pts >= 3) {
      aligned.push({ qLabel: QUESTION_LABELS[q.id] || q.id, answerLabel, points: pts, stance });
    } else if (pts <= 1) {
      misaligned.push({ qLabel: QUESTION_LABELS[q.id] || q.id, answerLabel, points: pts, stance });
    }
  });

  // Build the "Where you aligned" block (non-issue dimensions)
  if (aligned.length > 0) {
    const items = aligned.map(a => {
      const stanceText = a.stance ? ` — ${a.stance}` : '';
      return `<div class="alignment-item"><strong>${a.qLabel}:</strong> you chose <strong>${a.answerLabel}</strong>${stanceText}</div>`;
    }).join('');
    reasons.push({
      q: null,
      html: `<div class="alignment-block positive">
        <div class="alignment-header"><span class="alignment-icon">✓</span> Where else ${winnerFirst} matches you</div>
        ${items}
      </div>`
    });
  }

  // Build the "Where you didn't align" block
  if (misaligned.length > 0) {
    const items = misaligned.map(m => {
      let note;
      if (m.stance) {
        note = ` — ${m.stance}`;
      } else {
        const q = QUESTIONS.find(qq => QUESTION_LABELS[qq.id] === m.qLabel);
        if (q) {
          const ansKey = state.answers[q.id];
          const opt = q.options.find(o => o.key === ansKey);
          if (opt && opt.weights) {
            const topScorer = Object.entries(opt.weights).sort((a, b) => b[1] - a[1])[0];
            if (topScorer && topScorer[0] !== winnerKey) {
              note = ` — ${lastName(CANDIDATES[topScorer[0]].name)} would have scored higher on this dimension.`;
            } else {
              note = `.`;
            }
          } else { note = `.`; }
        } else { note = `.`; }
      }
      return `<div class="alignment-item"><strong>${m.qLabel}:</strong> you chose <strong>${m.answerLabel}</strong>${note}</div>`;
    }).join('');
    reasons.push({
      q: null,
      html: `<div class="alignment-block negative">
        <div class="alignment-header"><span class="alignment-icon">!</span> Where you and ${winnerFirst} don't fully line up</div>
        ${items}
        <div class="alignment-item" style="margin-top: 8px; font-style: italic; color: #666; -webkit-text-fill-color: #666;">${winnerFirst} still scored highest overall — your other priorities outweighed these gaps.</div>
      </div>`
    });
  }

  // 4. Head-to-head vs runner-up
  const winnerScore = sorted[0][1];
  const runnerScore = sorted[1][1];
  const runner = CANDIDATES[runnerKey];
  const vsDetail = buildHeadToHead(winnerKey, runnerKey);
  reasons.push({
    q: null,
    html: `<div class="vs-box">
      <div class="vs-header">Why ${winnerFirst}, not ${lastName(runner.name)}?</div>
      <div class="vs-body">Your answers pointed more often to ${winnerFirst}. ${vsDetail}</div>
    </div>`
  });

  return reasons;
}

// Analyze which specific answers tipped the race between two candidates
function buildHeadToHead(winnerKey, runnerKey) {
  const diffs = [];
  QUESTIONS.forEach(q => {
    if (q.id === 'redflag') return;
    const ans = state.answers[q.id];
    if (!ans) return;

    if (q.multi) {
      // Multi-select: compute rank-weighted diff across all picks
      if (!Array.isArray(ans) || ans.length === 0) return;
      let winnerTotal = 0, runnerTotal = 0;
      ans.forEach((key, idx) => {
        const opt = q.options.find(o => o.key === key);
        if (!opt || !opt.weights) return;
        const mult = RANK_MULTIPLIERS[idx] || 0;
        winnerTotal += (opt.weights[winnerKey] || 0) * mult;
        runnerTotal += (opt.weights[runnerKey] || 0) * mult;
      });
      const diff = Math.round(winnerTotal - runnerTotal);
      if (Math.abs(diff) >= 1) {
        // For multi-select, name the highest-ranked issue as the label
        const topKey = ans[0];
        const answerLabel = ANSWER_LABELS[q.id] ? ANSWER_LABELS[q.id][topKey] : topKey;
        diffs.push({ qId: q.id, qLabel: QUESTION_LABELS[q.id] || q.id, answerLabel, diff });
      }
    } else {
      const opt = q.options.find(o => o.key === ans);
      if (!opt || !opt.weights) return;
      const winnerPts = opt.weights[winnerKey] || 0;
      const runnerPts = opt.weights[runnerKey] || 0;
      const diff = winnerPts - runnerPts;
      if (Math.abs(diff) >= 1) {
        diffs.push({
          qId: q.id,
          qLabel: QUESTION_LABELS[q.id] || q.id,
          answerLabel: ANSWER_LABELS[q.id] ? ANSWER_LABELS[q.id][ans] : ans,
          diff
        });
      }
    }
  });

  const winnerFirst =lastName( CANDIDATES[winnerKey].name);
  const runnerFirst =lastName( CANDIDATES[runnerKey].name);

  const winnerAdvantages = diffs.filter(d => d.diff > 0).sort((a, b) => b.diff - a.diff);
  const runnerAdvantages = diffs.filter(d => d.diff < 0).sort((a, b) => a.diff - b.diff);

  if (winnerAdvantages.length === 0) {
    return `Your answers were split almost evenly between ${winnerFirst} and ${runnerFirst}. The win comes from small accumulated edges rather than one big difference.`;
  }

  const top = winnerAdvantages[0];
  let text = `The biggest edge was on <strong>${top.qLabel.toLowerCase()}</strong> — ${winnerFirst} lined up more closely with your answer than ${runnerFirst}.`;

  const moreWins = winnerAdvantages.slice(1, 3);
  if (moreWins.length > 0) {
    const others = moreWins.map(d => d.qLabel.toLowerCase()).join(' and ');
    text += ` ${winnerFirst} also edged ahead on ${others}.`;
  }

  const significantRunnerWins = runnerAdvantages.filter(d => Math.abs(d.diff) >= 2);
  if (significantRunnerWins.length > 0) {
    const item = significantRunnerWins[0];
    text += ` ${runnerFirst} did score higher on <strong>${item.qLabel.toLowerCase()}</strong>, but not by enough to close the overall gap.`;
  }

  return text;
}

function begin() { state.step = 0; window.scrollTo({ top: 0, behavior: 'smooth' }); render(); }
function answer(qid, key) {
  state.answers[qid] = key;
  render();
  setTimeout(() => { state.step++; window.scrollTo({ top: 0, behavior: 'smooth' }); render(); }, 180);
}
function goBack() { if (state.step > 0) { state.step--; window.scrollTo({ top: 0, behavior: 'smooth' }); render(); } }
function restart() { state.step = -1; state.answers = {}; state.showScores = false; window.scrollTo({ top: 0, behavior: 'smooth' }); render(); }
function toggleScores() { state.showScores = !state.showScores; render(); }

function openBriefing() {
  const el = document.getElementById('briefing');
  const content = document.getElementById('briefingContent');
  if (!content.innerHTML.trim()) content.innerHTML = buildBriefing();
  el.classList.add('open');
  el.scrollTop = 0;
  document.body.style.overflow = 'hidden';
}
function closeBriefing() {
  document.getElementById('briefing').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeBriefing();
});

// Build the interpretive part of the economic reference (AI question, glossary, sources).
// The side-by-side tables live on the landing page; this content is appended to the briefing overlay.
function buildEconContext() {
  let html = '';
  html += `<h1>Economic Context — Supplementary Reference</h1>`;
  html += `<p class="lead">The side-by-side tables on the landing page show what changed between the end of 2024 and April 2026. This section adds the interpretive context: why AI investment is a mixed bag, what the key terms mean, and where the data comes from.</p>`;

  html += `<div class="section-kicker">§ A — The AI Question</div>`;
  html += `<h2>Why AI investment is both a positive and a negative</h2>`;
  html += `<p class="lead">Headline economic numbers (GDP, stock market, venture capital flow) have been propped up substantially by AI infrastructure investment. But AI's costs — to electricity bills, water supplies, land use, and employment — are not captured in those same metrics. A fair accounting includes both.</p>`;
  html += `<h3>What AI is adding</h3>`;
  html += `<p>AI data center construction and chip manufacturing have driven hundreds of billions in capital investment. This creates construction jobs, generates tax revenue for some host communities, and is the largest single reason U.S. GDP growth has held up in 2025 and 2026 despite headwinds elsewhere. Seven of the 10 largest investment deals in the Americas in early 2025 occurred in California alone.</p>`;
  html += `<h3>What AI is extracting</h3>`;
  html += `<div class="econ-callout-box"><span class="econ-callout-box-label">Electricity</span>U.S. data centers now consume about 4.4% of all U.S. electricity, up from 1.9% in 2018, and could reach 12% by 2028. Residential rates across 13 states are projected to rise 20% in summer 2026 and 30–60% by 2030 due to data center demand.</div>`;
  html += `<div class="econ-callout-box"><span class="econ-callout-box-label">Water</span>Large data centers can consume up to 5 million gallons of water per day — equivalent to a town of 10,000–50,000 people. More than 160 AI data centers have been built in water-scarce regions over the past three years.</div>`;
  html += `<div class="econ-callout-box"><span class="econ-callout-box-label">Land</span>Data center permits have been approved on farmland and wetlands. Between March and June 2025, community opposition blocked or delayed $98 billion in projects. Over 30 states have introduced 300+ bills on data center regulation in 2026.</div>`;
  html += `<div class="econ-callout-box"><span class="econ-callout-box-label">Employment</span>Tech layoffs directly attributed to AI reached ~55,000 in 2025; modeling estimates put the true number at 200,000–300,000. Young workers are being hit hardest — a 14% drop in the job-finding rate in AI-exposed occupations, and a 16% fall in employment for ages 22–25 in those fields.</div>`;
  html += `<h3>Why this matters for voting</h3>`;
  html += `<p>Different policies push AI's costs onto different groups:</p>`;
  html += `<ul>
    <li><strong>Tax incentives</strong> for data centers shift costs from corporations to residents.</li>
    <li><strong>Permitting authority</strong> at local vs. state level determines who controls where data centers are built.</li>
    <li><strong>Utility rate rules</strong> determine whether households subsidize data center power use.</li>
    <li><strong>Worker retraining and unemployment insurance</strong> programs determine the safety net for those displaced by automation.</li>
    <li><strong>Environmental review</strong> requirements determine whether wetlands, farmland, and water supplies are protected.</li>
  </ul>`;
  html += `<p>Candidates at every level take positions on these questions. Those positions shape who bears AI's costs and who captures its benefits.</p>`;

  html += `<div class="section-kicker">§ B — Glossary</div>`;
  html += `<h2>Economic terms and acronyms</h2>`;
  const glossary = [
    ['CPI (Consumer Price Index)', 'The main measure of inflation in the U.S. Tracks the average change in prices for a "basket" of everyday goods and services — food, gas, rent, medical care, clothing. Published monthly by the Bureau of Labor Statistics.'],
    ['YoY (Year-over-Year)', 'A comparison between a data point today and the same data point 12 months ago. "Gas prices up 29.5% YoY" means gas costs 29.5% more than it did one year ago.'],
    ['GDP (Gross Domestic Product)', 'The total dollar value of all goods and services produced. "GDP growth" of 2.2% means the economy produced 2.2% more than the previous year, adjusted for inflation. 2–3% is generally healthy.'],
    ['Fed Funds Rate', 'The interest rate the Federal Reserve sets for banks lending to each other overnight. It influences almost every other interest rate — mortgages, credit cards, car loans. Higher rates cool inflation but slow the economy.'],
    ['30-Year Mortgage Rate', 'The average interest rate on a 30-year fixed-rate home loan. A 1-point change (e.g., 7% to 6%) can mean hundreds of dollars a month in payments.'],
    ['Unemployment Rate', 'The percentage of people in the labor force who do not have a job but are actively looking. Does NOT count people who have given up looking.'],
    ['Monthly Job Growth', 'The net number of new jobs added to the economy each month. 150,000–200,000 per month has historically been considered healthy; under 50,000 suggests a weakening labor market.'],
    ['Tariffs', 'Taxes on imported goods. When the U.S. places a tariff on imports, the cost of those goods rises for American buyers. Tariffs implemented in 2025 have been a major driver of inflation.'],
    ['VC (Venture Capital)', 'Money invested in early-stage or high-growth companies. When most U.S. venture capital flows to one region, that region captures most new-company formation.'],
    ['AI Infrastructure Investment', 'Capital spent on data centers, chips (GPUs), model training, and AI-related startups. One of the largest drivers of U.S. economic growth in 2025–2026.'],
    ['Strait of Hormuz', 'A narrow waterway in the Persian Gulf through which about 20 million barrels of oil pass daily. Disruption of shipping during the 2026 U.S.–Iran conflict drove global oil prices — and U.S. gas prices — sharply higher.']
  ];
  glossary.forEach(([term, def]) => {
    html += `<div class="econ-glossary-item"><span class="econ-glossary-term">${term}</span><div class="econ-glossary-def">${def}</div></div>`;
  });

  html += `<div class="section-kicker">§ C — Sources & Methodology</div>`;
  html += `<h2>Where the economic data comes from</h2>`;
  html += `<p>All figures were compiled in April 2026 from publicly available sources:</p>`;
  html += `<ul>
    <li>U.S. Bureau of Labor Statistics (CPI, unemployment, employment)</li>
    <li>Freddie Mac Primary Mortgage Market Survey (mortgage rates)</li>
    <li>U.S. Energy Information Administration and AAA (gas & diesel prices)</li>
    <li>USDA Economic Research Service (food prices)</li>
    <li>Federal Reserve (interest rates)</li>
    <li>UCLA Anderson Forecast (California economic outlook)</li>
    <li>IMF Article IV Consultation for the United States (April 2026)</li>
    <li>Deloitte, KPMG, Vanguard, U.S. Bank economic forecasts</li>
    <li>Lincoln Institute, Consumer Reports, Environmental Law Institute (data center impacts)</li>
    <li>Anthropic labor market research, Harvard Business Review, Fortune (AI employment impact)</li>
  </ul>`;
  html += `<h3>A note on "better" vs. "worse"</h3>`;
  html += `<p>The labels reflect factual impact on household affordability, job availability, and cost of living. Rising home prices are labeled "Worse" because they make homes less affordable for buyers. Rising gas, grocery, or energy prices are labeled "Worse" because they reduce household purchasing power.</p>`;
  html += `<h3>What this reference does not cover</h3>`;
  html += `<p>This reference does not assess specific candidates, rank parties, or predict future elections. It compares economic indicators at two points in time and notes the federal administration during each period.</p>`;

  return html;
}

function buildCandidateCard(d) {
  return `
    <div class="bcard">
      <div class="bcard-head">${d.name}</div>
      <div class="bcard-sub">${d.role}</div>
      <div class="bcard-label">Experience</div>
      <div class="bcard-body">${d.exp}</div>
      <div class="bcard-label">Money raised</div>
      <div class="bcard-body">${d.money}</div>
      <div class="bcard-label">Top pros</div>
      <div class="bcard-body">${d.pros}</div>
      <div class="bcard-label">Top cons</div>
      <div class="bcard-body">${d.cons}</div>
      <div class="bcard-label">Platform headlines</div>
      <div class="bcard-body">${d.platform}</div>
      <div class="bcard-label">Current polling</div>
      <div class="bcard-body">${d.polling}</div>
    </div>
  `;
}

function buildGlossary() {
  const terms = [
    ["ACA", "Affordable Care Act. Federal health-insurance law often called Obamacare. Becerra defended it as CA AG."],
    ["AG", "Attorney General. California's chief law-enforcement officer. Becerra held this job 2017-2021."],
    ["AUM", "Assets Under Management. The dollar value a fund like Farallon manages for investors."],
    ["CAL-ACCESS", "CA Secretary of State's public database of campaign finance filings."],
    ["CCA / CoreCivic", "Corrections Corporation of America, now CoreCivic. Private prison operator and major federal ICE contractor."],
    ["CDE", "California Department of Education. Thurmond has led it since 2019."],
    ["CDI", "California Department of Insurance. Regulates insurers and approves rate changes."],
    ["CEQA", "California Environmental Quality Act. Requires environmental impact review on development. Target of housing-reform efforts because it allows wide-ranging private lawsuits."],
    ["Clearance rate", "Percentage of reported crimes police solve (typically by arrest). Bianco's department is lowest in CA at 9.2%."],
    ["CPUC", "California Public Utilities Commission. Regulates utility rates."],
    ["CRPA", "California Rifle and Pistol Association. Gun-rights group endorsing Bianco."],
    ["DACA", "Deferred Action for Childhood Arrivals. Federal program protecting Dreamers. Becerra led the 21-state coalition that defended it against termination."],
    ["FARA", "Foreign Agents Registration Act. Federal law requiring registration when lobbying for foreign principals. Relevant to the Mercury Public Affairs Manafort-era investigation."],
    ["FPPC", "California Fair Political Practices Commission. Enforces campaign finance and conflict-of-interest laws. Currently holding an April 2026 complaint against Mahan."],
    ["Form 700", "CA Statement of Economic Interests. Required disclosure of real estate, investments, gifts, business positions."],
    ["Hatch Act", "Federal law limiting political activity by federal employees including cabinet officers. Becerra faced 2024 reporting about possibly violating it."],
    ["HHS", "US Department of Health and Human Services. Becerra served as Secretary 2021-2025."],
    ["ICE", "US Immigration and Customs Enforcement."],
    ["Independent expenditure / super PAC", "Committee that can raise and spend unlimited money, not allowed to coordinate with the candidate. The pro-Mahan California Back to Basics PAC is an example."],
    ["Measure E (San Jose)", "Voter-approved property-transfer tax in San Jose funding permanent affordable housing. Mahan redirected some to temporary shelter."],
    ["Measure R (LA)", "2008 LA County sales-tax increase Villaraigosa championed. Funded ~$40B in transportation over 30 years."],
    ["NIFLA v. Becerra", "2018 Supreme Court case (5-4) striking down the CA law Becerra defended requiring crisis pregnancy centers to advertise state-funded abortion services."],
    ["Oath Keepers", "Far-right group classified as extremist by SPLC, with members indicted for January 6. Bianco was a paid 2014 member."],
    ["Omnicom", "Global advertising and communications holding company that owns Mercury Public Affairs."],
    ["Prop 13", "1978 CA ballot measure capping property taxes. 'Split roll' refers to reforming commercial property taxes while preserving residential protections."],
    ["Prop 36", "2024 CA ballot measure that increased penalties for certain drug and theft offenses and allows treatment-mandated felony alternatives. Passed 2-to-1."],
    ["Prop 47", "2014 CA ballot measure reducing certain drug and theft offenses to misdemeanors."],
    ["Prop 50", "2025 CA ballot measure (Election Rigging Response Act) allowing CA to redraw congressional districts. Bianco's ballot seizure targeted Prop 50 ballots."],
    ["Sanctuary state", "A state (California, via SB 54) that limits local and state law-enforcement cooperation with federal immigration enforcement."],
    ["SB 54", "California Values Act (2017). California's sanctuary-state law. Bianco and Hilton want to weaken it; Becerra and Steyer want to defend it."],
    ["SB 79", "CA bill (Sen. Wiener) to allow multifamily housing near transit. Porter endorses."],
    ["Top-two primary", "CA primary format. All candidates on same ballot regardless of party; top two advance to November, even if same party."]
  ];
  return terms.map(([t, d]) => `<div class="gloss-term"><strong>${t}.</strong> ${d}</div>`).join('');
}

render();
</script>
